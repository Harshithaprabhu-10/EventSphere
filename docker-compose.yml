
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - eventsphere-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Tells Vite where the API lives at build time.
        # With Nginx proxying, this is just /api — no host or port needed.
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - eventsphere-network

networks:
  eventsphere-network:
    driver: bridge